openapi: 3.0.3
info:
  title: MCF LOS — Score Card API
  version: "1.0.0"
  description: >
    REST API for the Score Card module of the MCF Prize-Money-Against-Security Loan
    Origination System. Implements a 6-factor scoring model (CIBIL Score, Income-EMI
    Coverage, Security Coverage/LTV, DPD History, Enquiry Count, Guarantor Quality)
    plus the FRD-grounded security valuation formula — see DOCUMENTATION.md for the
    full business-rule reference.
  contact:
    name: MCF LOS Engineering
servers:
  - url: /api/v1
    description: Relative to whichever host this is deployed on (see DOCUMENTATION.md Section 16 for environment URLs)

tags:
  - name: Auth
  - name: ScoreCard
  - name: Masters

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and obtain a JWT access + refresh token pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employeeId, password]
              properties:
                employeeId: { type: string, example: EMP-1001 }
                password: { type: string, format: password, example: Password@123 }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          accessToken: { type: string }
                          refreshToken: { type: string }
                          expiresIn: { type: string, example: 15m }
                          user: { $ref: '#/components/schemas/UserSummary' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Exchange a valid refresh token for a new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: New access token issued
        '401': { $ref: '#/components/responses/Unauthorized' }

  /score-cards:
    post:
      tags: [ScoreCard]
      summary: Create Score Card
      description: Requires the `caseCreate` permission (BI role in the current role matrix).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateScoreCardRequest' }
            example:
              applicationId: MCF-2024-001820
              chitValue: 6750000
              futureLiability: 6000000
              documentsComplete: true
              subscriber:
                name: Meena Devi Nair
                profileType: SALARIED
                responses:
                  - { parameterId: 1, selectedOptionId: 4 }
                  - { parameterId: 8, selectedOptionId: 22 }
              guarantors:
                - name: Sundar Meenakshisundaram
                  profileType: BUSINESS
                  responses:
                    - { parameterId: 15, selectedOptionId: 61 }
              securities:
                - securityType: Chit Passbook
                  holderName: Kalaivani Natarajan
                  loyaltyUsn: USN7106
                  apiSourcedValue: 3300000
      responses:
        '201':
          description: Score card created in DRAFT status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties: { data: { $ref: '#/components/schemas/ScoreCard' } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

    get:
      tags: [ScoreCard]
      summary: List score cards (paginated, filterable, sortable)
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/Status' }
        - name: applicationId
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema: { type: string, example: "created_at:desc" }
      responses:
        '200':
          description: Paginated list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: '#/components/schemas/ScoreCard' } }
                      meta: { $ref: '#/components/schemas/PaginationMeta' }
        '400': { description: Invalid sort field }

  /score-cards/application/{applicationId}:
    get:
      tags: [ScoreCard]
      summary: Get Score Card by Application ID
      parameters:
        - name: applicationId
          in: path
          required: true
          schema: { type: string, pattern: '^MCF-\d{4}-\d{6}$' }
      responses:
        '200':
          description: Score card found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties: { data: { $ref: '#/components/schemas/ScoreCard' } }
        '404': { $ref: '#/components/responses/NotFound' }

  /score-cards/{id}:
    parameters:
      - { $ref: '#/components/parameters/ScoreCardId' }
    get:
      tags: [ScoreCard]
      summary: Get Score Card
      responses:
        '200':
          description: Score card found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties: { data: { $ref: '#/components/schemas/ScoreCard' } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [ScoreCard]
      summary: Update Score Card
      description: >
        Allowed only while status is DRAFT, VALIDATED or REJECTED. Editing a VALIDATED
        card reverts it to DRAFT (it must be re-validated before it can be re-submitted).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateScoreCardRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties: { data: { $ref: '#/components/schemas/ScoreCard' } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/BusinessRuleError' }
    delete:
      tags: [ScoreCard]
      summary: Delete Score Card (soft delete)
      description: Only permitted while status is DRAFT.
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/BusinessRuleError' }

  /score-cards/{id}/draft:
    parameters: [{ $ref: '#/components/parameters/ScoreCardId' }]
    patch:
      tags: [ScoreCard]
      summary: Save Draft
      description: Persists in-progress edits with no validation gate and no status change.
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateScoreCardRequest' }
      responses:
        '200': { description: Draft saved }
        '422': { $ref: '#/components/responses/BusinessRuleError' }

  /score-cards/{id}/validate:
    parameters: [{ $ref: '#/components/parameters/ScoreCardId' }]
    post:
      tags: [ScoreCard]
      summary: Validate Score Card
      description: >
        Recomputes the score and evaluates the three submit guards: documentsComplete,
        securityCoversLiability, cibilComplete. On success (all guards pass), transitions
        DRAFT -> VALIDATED. On failure, the score card stays DRAFT and the response lists
        which guards failed (HTTP 422, not an error — check `data.valid`).
      responses:
        '200':
          description: All guards passed; card is now VALIDATED
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties: { data: { $ref: '#/components/schemas/ValidateResult' } }
        '422':
          description: One or more guards failed — card remains DRAFT
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties: { data: { $ref: '#/components/schemas/ValidateResult' } }

  /score-cards/{id}/submit:
    parameters: [{ $ref: '#/components/parameters/ScoreCardId' }]
    post:
      tags: [ScoreCard]
      summary: Submit Score Card
      description: Requires status VALIDATED (call /validate first).
      responses:
        '200': { description: Submitted; status is now SUBMITTED }
        '422': { $ref: '#/components/responses/BusinessRuleError' }

  /score-cards/{id}/approve:
    parameters: [{ $ref: '#/components/parameters/ScoreCardId' }]
    post:
      tags: [ScoreCard]
      summary: Approve Score Card
      description: Requires the `caseApprove` permission and status SUBMITTED.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: { remarks: { type: string, maxLength: 2000 } }
      responses:
        '200': { description: Approved; status is now APPROVED }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/BusinessRuleError' }

  /score-cards/{id}/reject:
    parameters: [{ $ref: '#/components/parameters/ScoreCardId' }]
    post:
      tags: [ScoreCard]
      summary: Reject Score Card
      description: Requires the `caseReject` permission and status SUBMITTED.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rejectionReason]
              properties: { rejectionReason: { type: string, minLength: 5, maxLength: 2000 } }
      responses:
        '200': { description: Rejected; status is now REJECTED }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /score-cards/{id}/recalculate:
    parameters: [{ $ref: '#/components/parameters/ScoreCardId' }]
    post:
      tags: [ScoreCard]
      summary: Recalculate Score
      description: Recomputes scores from current inputs without changing status. Blocked once APPROVED or REJECTED.
      responses:
        '200': { description: Scores recomputed }
        '422': { $ref: '#/components/responses/BusinessRuleError' }

  /score-cards/{id}/summary:
    parameters: [{ $ref: '#/components/parameters/ScoreCardId' }]
    get:
      tags: [ScoreCard]
      summary: Get Score Summary
      responses:
        '200':
          description: Summary of score, grade, decision and guard status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties: { data: { $ref: '#/components/schemas/ScoreSummary' } }

  /score-cards/{id}/history:
    parameters: [{ $ref: '#/components/parameters/ScoreCardId' }]
    get:
      tags: [ScoreCard]
      summary: Get Score History
      description: Every version snapshot (one per create/update/validate/submit/approve/reject/recalculate), newest first.
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
      responses:
        '200': { description: Paginated version history }

  /score-cards/{id}/audit-logs:
    parameters: [{ $ref: '#/components/parameters/ScoreCardId' }]
    get:
      tags: [ScoreCard]
      summary: Get Audit Logs
      description: Requires the `auditView` permission (ADMIN only in the current role matrix).
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
      responses:
        '200': { description: Paginated audit log }
        '403': { $ref: '#/components/responses/Forbidden' }

  /score-cards/{id}/documents:
    parameters: [{ $ref: '#/components/parameters/ScoreCardId' }]
    post:
      tags: [ScoreCard]
      summary: Upload Supporting Documents
      description: >
        Requires the `docUpload` permission. Accepts a pre-uploaded file's URL (e.g. a
        pre-signed S3/Azure Blob URL) rather than a raw multipart body — the API itself
        does not proxy file bytes; see DOCUMENTATION.md Section 12 for the upload flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [documentType, fileName, fileUrl]
              properties:
                documentType: { type: string, enum: [DPN, KYC, "Gold Appraisal", "Income Proof", "Address Proof", "Bank Statement", Other] }
                fileName: { type: string, maxLength: 255 }
                fileUrl: { type: string, format: uri }
                mimeType: { type: string }
                fileSizeBytes: { type: integer, maximum: 26214400 }
      responses:
        '201': { description: Document record created }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    get:
      tags: [ScoreCard]
      summary: List supporting documents
      responses:
        '200': { description: Document list }

  /masters/security-types:
    get:
      tags: [Masters]
      summary: Get Dropdown Masters — Security Types
      responses:
        '200': { description: List of security types with LTV caps and approval authority }

  /masters/credit-score-parameters:
    get:
      tags: [Masters]
      summary: Get Credit Score Card parameter + option matrix for a profile (SALARIED or BUSINESS)
      description: >
        Sourced verbatim from Credit Score.xlsx (db/seed_credit_score.sql) — the
        ordered list of QUANTITATIVE parameters (each with its dropdown options)
        and QUALITATIVE parameters (fixed-penalty flags) for one profile. Drives
        both the score card form UI and the request shape for score-card
        subscriber/guarantor `responses[]`. See DOCUMENTATION.md Section 19.
      parameters:
        - name: profileType
          in: query
          required: true
          schema: { type: string, enum: [SALARIED, BUSINESS] }
      responses:
        '200':
          description: Ordered parameter list, each with nested options for QUANTITATIVE parameters
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CreditScoreParameter' }
        '400': { description: profileType missing or not SALARIED/BUSINESS }

  /masters/document-types:
    get:
      tags: [Masters]
      summary: Get Dropdown Masters — Supporting Document Types
      responses:
        '200': { description: Document type enum }

  /masters/roles:
    get:
      tags: [Masters]
      summary: Get Dropdown Masters — Roles
      responses:
        '200': { description: Role list }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ScoreCardId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }

  responses:
    Unauthorized:
      description: Missing, malformed or expired token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Forbidden:
      description: Authenticated but not permitted to perform this action
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    NotFound:
      description: Resource does not exist
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Conflict:
      description: Duplicate or conflicting state
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    ValidationError:
      description: One or more fields failed schema validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    BusinessRuleError:
      description: The request is well-formed but violates a business/workflow rule (e.g. wrong status for this action)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  schemas:
    Status:
      type: string
      enum: [DRAFT, VALIDATED, SUBMITTED, UNDER_REVIEW, APPROVED, REJECTED]

    UserSummary:
      type: object
      properties:
        id: { type: integer }
        employeeId: { type: string }
        fullName: { type: string }
        role: { type: string }
        branchCode: { type: string, nullable: true }

    CreditScoreParameterOption:
      type: object
      properties:
        id: { type: integer }
        label: { type: string }
        weightage: { type: number, minimum: 0, maximum: 1 }
        displayOrder: { type: integer }

    CreditScoreParameter:
      type: object
      description: One row from Credit Score.xlsx, exactly as seeded — see DOCUMENTATION.md Section 19.
      properties:
        id: { type: integer }
        profileType: { type: string, enum: [SALARIED, BUSINESS] }
        slNo: { type: string, description: "'1'..'14' for QUANTITATIVE, 'a'..'g' for QUALITATIVE" }
        name: { type: string }
        category: { type: string, enum: [QUANTITATIVE, QUALITATIVE] }
        maxScore: { type: number, description: "Negative for QUALITATIVE (a fixed penalty)" }
        displayOrder: { type: integer }
        options:
          type: array
          description: Only populated for QUANTITATIVE parameters
          items: { $ref: '#/components/schemas/CreditScoreParameterOption' }

    PersonResponse:
      type: object
      required: [parameterId]
      description: >
        One answered parameter. Exactly one of selectedOptionId (QUANTITATIVE) or
        qualitativeFlag (QUALITATIVE) must be present. A person's `responses[]`
        may be a partial subset of their profile's parameters (draft state) —
        QUANTITATIVE parameters left out simply score 0 until answered.
      properties:
        parameterId: { type: integer }
        selectedOptionId: { type: integer, nullable: true }
        qualitativeFlag: { type: boolean, nullable: true }
        netScore: { type: number, readOnly: true, description: "Server-computed: maxScore x option.weightage, or maxScore x flag" }

    Person:
      type: object
      required: [name, profileType]
      description: >
        One subscriber/guarantor. `profileType` selects which of the two
        independent Credit Score sheets (Employee/Salaried or Business) this
        person's `responses[]` are validated and scored against — see
        DOCUMENTATION.md Section 19, Excel-to-Application Mapping.
      properties:
        id: { type: integer, readOnly: true }
        role: { type: string, readOnly: true, description: "'SB' or 'SURETY-1', 'SURETY-2', ..." }
        name: { type: string }
        profileType: { type: string, enum: [SALARIED, BUSINESS] }
        totalScore: { type: number, readOnly: true, nullable: true, description: "Sum of QUANTITATIVE net scores (Excel 'Total Score', max 100)" }
        totalFinalScore: { type: number, readOnly: true, nullable: true, description: "totalScore + sum of QUALITATIVE penalties (Excel 'Total Final Score')" }
        responses: { type: array, items: { $ref: '#/components/schemas/PersonResponse' } }

    Security:
      type: object
      required: [securityType]
      description: >
        `valueLoaded` (the Accepted Value) is ALWAYS server-computed from the
        type-specific raw input fields below, per the FRD Section 6.1 Accepted Value
        Formula table — it is never accepted as raw client input. Which raw fields
        are required depends on `securityType`; see DOCUMENTATION.md Section 5.6.
      properties:
        securityType:
          type: string
          enum: [Gold Ornaments, LIC Policy, Bank Guarantee, Fixed Deposit, Sub-Debt, "Mortgage (Property)", Chit Passbook, Demat NCD, Demat Shares, Personal Surety]
        holderName: { type: string, nullable: true }
        loyaltyUsn: { type: string, nullable: true }
        netWeightGrams: { type: number, description: "Gold Ornaments only" }
        ratePerGram: { type: number, description: "Gold Ornaments only" }
        surrenderValue: { type: number, description: "LIC Policy only" }
        faceValue: { type: number, description: "Bank Guarantee / Fixed Deposit / Demat NCD" }
        apiSourcedValue: { type: number, description: 'Sub-Debt / Chit Passbook ("As per API")' }
        maturityDate: { type: string, format: date, description: "Sub-Debt only" }
        forcedSaleValue: { type: number, description: "Mortgage (Property) only" }
        marketValue: { type: number, description: "Demat Shares only" }
        liabilityToSecure: { type: number, description: "Demat Shares only" }
        freeValue: { type: number, readOnly: true, description: "Server-computed gross/reference value before the formula reduction" }
        valueLoaded: { type: number, readOnly: true, description: "Server-computed Accepted Value, after the type-specific formula" }

    CreateScoreCardRequest:
      type: object
      required: [applicationId, chitValue, futureLiability, subscriber, securities]
      properties:
        applicationId: { type: string, pattern: '^MCF-\d{4}-\d{6}$' }
        chitValue: { type: number, minimum: 0.01, description: "Proposed loan / prize amount" }
        futureLiability: { type: number, minimum: 0.01 }
        documentsComplete: { type: boolean, default: false }
        subscriber: { $ref: '#/components/schemas/Person' }
        guarantors: { type: array, items: { $ref: '#/components/schemas/Person' }, maxItems: 4 }
        securities: { type: array, items: { $ref: '#/components/schemas/Security' }, minItems: 1 }

    UpdateScoreCardRequest:
      type: object
      properties:
        chitValue: { type: number }
        futureLiability: { type: number }
        documentsComplete: { type: boolean }
        subscriber: { $ref: '#/components/schemas/Person' }
        guarantors: { type: array, items: { $ref: '#/components/schemas/Person' } }
        securities: { type: array, items: { $ref: '#/components/schemas/Security' } }
        remarks: { type: string, maxLength: 2000 }

    ScoreCard:
      type: object
      description: >
        Per-person scoring: each of subscriber/guarantors carries its own
        totalScore/totalFinalScore (see Person schema) — there is no case-level
        blended score or eligibility field, since Credit Score.xlsx defines
        neither (see DOCUMENTATION.md Section 20, Open Questions).
      properties:
        id: { type: string, format: uuid }
        applicationId: { type: string }
        version: { type: integer }
        status: { $ref: '#/components/schemas/Status' }
        chitValue: { type: number }
        futureLiability: { type: number }
        securityTotalValue: { type: number }
        documentsComplete: { type: boolean }
        securityCoversLiability: { type: boolean }
        cibilComplete: { type: boolean, description: "True once the subscriber and every guarantor has answered their profile's CIBIL Score parameter" }
        subscriber: { $ref: '#/components/schemas/Person' }
        guarantors: { type: array, items: { $ref: '#/components/schemas/Person' } }
        securities: { type: array, items: { $ref: '#/components/schemas/Security' } }
        rejectionReason: { type: string, nullable: true }
        remarks: { type: string, nullable: true }

    ValidateResult:
      type: object
      properties:
        valid: { type: boolean }
        failedGuards:
          type: array
          items:
            type: object
            properties:
              guard: { type: string, enum: [documentsComplete, securityCoversLiability, cibilComplete] }
              message: { type: string }
        scoreCard: { $ref: '#/components/schemas/ScoreCard' }

    PersonSummary:
      type: object
      properties:
        id: { type: integer }
        role: { type: string }
        name: { type: string }
        profileType: { type: string, enum: [SALARIED, BUSINESS] }
        totalScore: { type: number, nullable: true }
        totalFinalScore: { type: number, nullable: true }

    ScoreSummary:
      type: object
      properties:
        applicationId: { type: string }
        status: { $ref: '#/components/schemas/Status' }
        subscriber: { $ref: '#/components/schemas/PersonSummary' }
        guarantors: { type: array, items: { $ref: '#/components/schemas/PersonSummary' } }
        readyToSubmit: { type: boolean }
        guardStatus:
          type: object
          properties:
            documentsComplete: { type: boolean }
            securityCoversLiability: { type: boolean }
            cibilComplete: { type: boolean }

    PaginationMeta:
      type: object
      properties:
        page: { type: integer }
        pageSize: { type: integer }
        totalRecords: { type: integer }
        totalPages: { type: integer }

    SuccessEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: {}
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    ErrorEnvelope:
      type: object
      properties:
        success: { type: boolean, example: false }
        error:
          type: object
          properties:
            code: { type: string, example: VALIDATION_ERROR }
            message: { type: string }
            details:
              type: array
              items:
                type: object
                properties: { field: { type: string }, message: { type: string } }
            requestId: { type: string, format: uuid }
